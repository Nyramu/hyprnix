name: Deploy Docs
on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - uses: cachix/cachix-action@v17
        with:
          name: hyprnix
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Build options JSON
        run: nix build .#options-json

      - name: Generate docs
        run: |
          nix run github:feel-co/ndg#ndg -- html \
            --input-dir ./docs \
            --module-options ./result/share/doc/nixos/options.json \
            --output-dir ./docs-out \
            --title "Hyprnix Documentation" \
            --generate-search \
            --highlight-code \
            --revision main \
            --footer "Hyprnix docs - made with ndg"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs-out

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to Github Pages
        uses: actions/deploy-pages@v4
        id: deployment
